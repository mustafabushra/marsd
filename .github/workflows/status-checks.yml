name: Status Checks

on:
  workflow_run:
    workflows: ['CI - Lint, Test, Build', 'Security Scanning', 'Code Coverage Reports', 'Cross-Platform Tests']
    types: [completed]

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - name: Check workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });

            console.log(`Workflow: ${run.data.name}`);
            console.log(`Status: ${run.data.conclusion}`);
            console.log(`URL: ${run.data.html_url}`);

            if (run.data.conclusion === 'failure') {
              core.setFailed(`Workflow ${run.data.name} failed`);
            }

      - name: Update PR status
        if: github.event_name == 'workflow_run' && github.event.workflow_run.pull_requests.length > 0
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            const runConclusion = context.payload.workflow_run.conclusion;

            const status = {
              success: 'All checks passed',
              failure: 'Some checks failed',
              neutral: 'Checks completed with warnings'
            };

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## Workflow Status: ${status[runConclusion] || 'Unknown'}`
            });
