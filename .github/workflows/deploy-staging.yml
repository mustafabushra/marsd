name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: staging-deployment
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # Build Backend
      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build
        env:
          NODE_ENV: staging

      # Build Agents
      - name: Install agents dependencies
        run: cd agents && npm ci

      - name: Build agents
        run: cd agents && npm run build

      # Build Frontend
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}
          VITE_ENV: staging

      # Run tests before deployment
      - name: Run backend tests
        run: cd backend && npm run test -- --passWithNoTests || true

      # Deploy to Vercel (Frontend)
      - name: Deploy frontend to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        if: success()
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
          vercel-args: '--prod --env NODE_ENV=staging'
          scope: ${{ secrets.VERCEL_ORG_ID }}
          working-directory: ./
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}

      # Deploy Backend (Railway/Render/etc)
      - name: Deploy backend to staging
        if: success()
        run: |
          echo "Deploying backend to staging environment..."
          # Add your backend deployment command here
          # Example for Railway: railway up --environment staging
          # Example for Render: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
          # Example for Vercel serverless: vercel --prod --env NODE_ENV=staging

      # Create deployment annotation
      - name: Create GitHub deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ secrets.STAGING_FRONTEND_URL }}',
              description: 'Deployment to staging completed'
            });

      # Slack notification on success
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Staging Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful*\n\n*Branch:* `develop`\n*Commit:* `${{ github.sha }}`\n*URL:* ${{ secrets.STAGING_FRONTEND_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Slack notification on failure
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Staging Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Failed*\n\n*Branch:* `develop`\n*Commit:* `${{ github.sha }}`\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
