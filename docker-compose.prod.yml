# ============================================================================
# MARSAD DOCKER COMPOSE - PRODUCTION OVERRIDE
# Production configuration to be used with docker-compose.yml
#
# USAGE:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

version: '3.9'

services:
  # ========================================================================
  # FRONTEND SERVICE - NGINX PRODUCTION
  # Optimized static file serving with compression and caching
  # ========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: marsad-frontend-prod
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - marsad-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Remove volumes section for production - use image built artifacts only
    # Remove command section for production - use default CMD from Dockerfile

  # ========================================================================
  # BACKEND SERVICE - NESTJS PRODUCTION
  # Optimized runtime with production build
  # ========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: marsad-backend-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://marsad:${DB_PASSWORD:-marsad-prod-password}@postgres:5432/marsad
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=900s
      - JWT_REFRESH_EXPIRATION=604800s
      - LOG_LEVEL=info
      - AWS_REGION=me-south-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - marsad-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Remove volumes section for production - use built image only
    # Remove command section for production - use default CMD from Dockerfile

  # ========================================================================
  # POSTGRESQL DATABASE SERVICE - PRODUCTION
  # Optimized for production workloads with increased connections and memory
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: marsad-postgres-prod
    restart: always
    environment:
      - POSTGRES_USER=marsad
      - POSTGRES_PASSWORD=${DB_PASSWORD:-marsad-prod-password}
      - POSTGRES_DB=marsad
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marsad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marsad -d marsad"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"

  # ========================================================================
  # REDIS CACHE SERVICE - PRODUCTION
  # Optimized for production with persistence and replication ready
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: marsad-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marsad-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --requirepass
      - "${REDIS_PASSWORD}"
    sysctls:
      - net.core.somaxconn=65535

# ============================================================================
# VOLUMES (Production)
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================================
# NETWORKS (Production)
# ============================================================================
networks:
  marsad-network:
    driver: bridge
